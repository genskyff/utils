name: CI

on:
  pull_request:
  push:
    branches:
      - "**"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Mise
        uses: jdx/mise-action@v4

      - name: Install packages
        run: deno install --frozen

      - name: Run tests
        run: deno run test
